---
name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        runner:
          - ubuntu-26.04
          - ubuntu-26.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out
        uses: actions/checkout@v6.0.3

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23.2.0

      - name: Build toolchain image
        run: make image

      - name: Lint
        run: make lint

      - name: Build fonts
        run: make build

      - name: Check that the committed build outputs are up to date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git status
            git diff --stat
            echo "::error::Building the fonts changed the committed outputs. Rebuild with make build and commit the result."
            exit 1
          fi

      - name: Font Bakery checks
        run: make test
